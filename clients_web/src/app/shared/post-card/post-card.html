<article class="post-card bg-[#151515]/80 border border-white/[0.08] backdrop-blur-xl rounded-2xl overflow-hidden shadow-2xl transition-all duration-500 hover:border-primary/20 hover:-translate-y-0.5 hover:shadow-primary/[0.02]">
    <!-- Header -->
    <div class="px-5 py-4 flex items-center justify-between border-b border-white/[0.03]">
        <div (click)="onAuthorClick($event)" class="flex items-center gap-3 cursor-pointer group/author">
            <div class="avatar-ring p-[2px] rounded-full bg-gradient-to-tr from-primary to-[#ff8f00] group-hover/author:scale-105 transition-transform">
                <img [src]="authorAvatar" [alt]="authorName" class="w-10 h-10 rounded-full object-cover border-2 border-[#151515]" />
            </div>
            <div class="flex flex-col">
                <div class="flex items-center gap-1.5">
                    <h4 class="font-['Epilogue'] font-black text-xs md:text-sm uppercase tracking-widest text-white leading-none group-hover/author:text-primary transition-colors">{{ authorName }}</h4>
                    <span class="material-symbols-outlined text-[13px] text-primary fill-current select-none" title="Artista Verificado">verified</span>
                </div>
                <span class="text-[9px] text-white/40 font-['Be_Vietnam_Pro'] font-light tracking-wide mt-1 flex items-center gap-1">
                    <span class="material-symbols-outlined text-[10px] text-primary/60">schedule</span>
                    {{ timeAgo }}
                </span>
            </div>
        </div>
        <div class="relative">
            <button (click)="toggleOptionsMenu($event)" 
                    class="w-8 h-8 rounded-full hover:bg-white/5 text-white/50 hover:text-primary flex items-center justify-center transition-all">
                <span class="material-symbols-outlined text-lg select-none">more_vert</span>
            </button>
            
            <!-- Options Dropdown Menu (Save, Report) -->
            <div *ngIf="showOptionsMenu()" 
                 class="absolute right-0 mt-1 w-40 bg-[#161616]/98 border border-white/[0.08] backdrop-blur-xl rounded-2xl shadow-2xl z-30 p-1 animate-lightbox-zoom-in font-['Be_Vietnam_Pro'] select-none">
                <button (click)="actionSave($event)" 
                        class="w-full flex items-center gap-2.5 px-3 py-2 text-xs text-white/70 hover:text-white hover:bg-white/5 rounded-xl transition-all">
                    <span class="material-symbols-outlined text-base" [ngClass]="isSaved() ? 'text-primary' : ''">
                        {{ isSaved() ? 'bookmark_added' : 'bookmark' }}
                    </span>
                    <span>{{ isSaved() ? 'Guardado' : 'Guardar' }}</span>
                </button>
                <button (click)="actionReport($event)" 
                        class="w-full flex items-center gap-2.5 px-3 py-2 text-xs text-red-400 hover:text-red-300 hover:bg-red-500/5 rounded-xl transition-all border-t border-white/[0.04]">
                    <span class="material-symbols-outlined text-base">flag</span>
                    <span>Reportar</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Content (Caption) -->
    <div class="px-5 pt-4 pb-2">
        <p class="post-text text-[13px] md:text-[14px] font-['Be_Vietnam_Pro'] text-white/80 font-light leading-relaxed">
            {{ content }}
        </p>
    </div>

    <!-- Tags (Mini Capsules) -->
    <div *ngIf="tags && tags.length > 0" class="px-5 pb-3 flex flex-wrap gap-1.5">
        <span *ngFor="let tag of tags" 
              class="text-[9px] font-medium font-['Be_Vietnam_Pro'] text-primary/90 bg-primary/5 px-2.5 py-0.5 rounded-full border border-primary/10 backdrop-blur-sm transition-all hover:bg-primary/15 hover:border-primary/25 cursor-pointer">
            {{ tag }}
        </span>
    </div>

    <!-- Media (Floating Frame) -->
    <div *ngIf="mediaUrl" 
         (click)="openLightbox($event)"
         class="px-5 pb-4">
        <div class="relative overflow-hidden bg-black/30 border border-white/[0.06] rounded-2xl cursor-zoom-in group/media aspect-[16/10] shadow-inner">
            <img [src]="mediaUrl" alt="Post media" class="w-full h-full object-cover group-hover/media:scale-[1.03] transition-transform duration-700 ease-out" />
            <div class="absolute inset-0 bg-black/40 opacity-0 group-hover/media:opacity-100 transition-opacity duration-300 flex items-center justify-center backdrop-blur-[1px]">
                <div class="bg-primary/20 backdrop-blur-md rounded-full w-11 h-11 flex items-center justify-center text-primary border border-primary/30 shadow-lg scale-90 group-hover/media:scale-100 transition-all duration-300">
                    <span class="material-symbols-outlined text-lg">zoom_in</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer Actions (Pills Layout) -->
    <div class="px-5 py-3 flex items-center gap-4 border-t border-white/[0.03]">
        <!-- Like/Reaction Pill -->
        <button (click)="toggleLike()"
                [ngClass]="isLiked() ? 'liked-pill' : 'action-pill'"
                class="flex items-center gap-2 px-4 py-1.5 rounded-full text-xs font-['Epilogue'] tracking-wider transition-all select-none border">
            <span class="material-symbols-outlined text-sm" 
                  [ngClass]="isLiked() ? 'animate-music-beat fill-current' : ''">
                music_note
            </span>
            <span>{{ likesCount() }}</span>
        </button>

        <!-- Comments Pill -->
        <button (click)="toggleComments()"
                [ngClass]="showComments() ? 'active-comment-pill' : 'action-pill'"
                class="flex items-center gap-2 px-4 py-1.5 rounded-full text-xs font-['Epilogue'] tracking-wider transition-all select-none border">
            <span class="material-symbols-outlined text-sm"
                  [ngClass]="showComments() ? 'fill-current' : ''">
                chat_bubble
            </span>
            <span>{{ commentsList().length }}</span>
        </button>

        <!-- Share Pill (Aligned Right) -->
        <div class="relative ml-auto">
            <button (click)="toggleShareMenu($event)" 
                    [ngClass]="showShareMenu() ? 'bg-primary/10 border-primary/20 text-primary shadow-sm' : 'action-pill'"
                    class="flex items-center justify-center w-8 h-8 rounded-full border transition-all">
                <span class="material-symbols-outlined text-sm select-none">share</span>
            </button>
            
            <!-- Share Dropdown Overlay -->
            <div *ngIf="showShareMenu()" 
                 class="absolute right-0 bottom-10 w-44 bg-[#161616]/98 border border-white/[0.08] backdrop-blur-xl rounded-2xl shadow-2xl z-30 p-1 animate-lightbox-zoom-in font-['Be_Vietnam_Pro'] select-none">
                
                <div class="px-3 py-1.5 border-b border-white/[0.04] mb-1 text-left">
                    <span class="text-[8px] font-['Epilogue'] font-black uppercase text-white/40 tracking-wider">Compartir vía</span>
                </div>
                
                <button (click)="shareWhatsApp($event)" 
                        class="w-full flex items-center gap-2.5 px-3 py-2 text-xs text-white/70 hover:text-white hover:bg-white/5 rounded-xl transition-all text-left">
                    <span class="material-symbols-outlined text-base text-[#25D366]">chat</span>
                    <span>WhatsApp</span>
                </button>
                <button (click)="shareInstagram($event)" 
                        class="w-full flex items-center gap-2.5 px-3 py-2 text-xs text-white/70 hover:text-white hover:bg-white/5 rounded-xl transition-all border-t border-white/[0.04] text-left">
                    <span class="material-symbols-outlined text-base text-[#E1306C]">photo_camera</span>
                    <span>Instagram</span>
                </button>
                <button (click)="copyPostLink($event)" 
                        class="w-full flex items-center gap-2.5 px-3 py-2 text-xs text-white/70 hover:text-white hover:bg-white/5 rounded-xl transition-all border-t border-white/[0.04] text-left">
                    <span class="material-symbols-outlined text-base text-primary">link</span>
                    <span>Copiar Enlace</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Collapsible Comments Drawer -->
    <div *ngIf="showComments()" 
         class="border-t border-white/[0.03] bg-black/[0.15] px-5 py-4 flex flex-col gap-4 animate-slide-down-comments">
        
        <!-- Comments List -->
        <div class="flex flex-col gap-3.5 max-h-60 overflow-y-auto pr-1 scrollbar-thin scrollbar-thumb-white/10">
            <div *ngFor="let c of commentsList()" class="comment-bubble flex gap-3 items-start bg-white/[0.015] border border-white/[0.03] p-3 rounded-2xl">
                <img [src]="c.avatar" class="w-7 h-7 rounded-full object-cover shrink-0 border border-white/10 shadow-sm" />
                <div class="flex-1 min-w-0">
                    <div class="flex items-baseline justify-between gap-2 mb-1">
                        <span class="text-[10px] font-['Epilogue'] font-black text-primary uppercase tracking-wide truncate">{{ c.userName }}</span>
                        <span class="text-[8px] text-white/35 font-light shrink-0">{{ c.time }}</span>
                    </div>
                    <p class="text-[11px] font-['Be_Vietnam_Pro'] text-white/80 font-light leading-relaxed break-words">{{ c.text }}</p>
                </div>
            </div>
            
            <div *ngIf="commentsList().length === 0" class="text-center py-6">
                <p class="text-[10px] text-white/30 italic">Sé el primero en comentar esta publicación.</p>
            </div>
        </div>

        <!-- Write New Comment Pill Form -->
        <form (submit)="submitComment($event)" class="flex gap-2 pt-2 border-t border-white/[0.03]">
            <div class="flex-1 bg-white/[0.03] border border-white/[0.08] rounded-full px-4 py-1.5 flex items-center gap-2 focus-within:border-primary/40 focus-within:bg-white/[0.05] transition-all">
                <input type="text" 
                       [ngModel]="newCommentText()" 
                       (ngModelChange)="newCommentText.set($event)"
                       name="postComment"
                       placeholder="Escribe un comentario..."
                       class="flex-1 bg-transparent text-[11px] text-white placeholder-white/30 focus:outline-none w-full">
            </div>
            <button type="submit" 
                    class="bg-primary hover:bg-primary-fixed text-on-primary w-8 h-8 rounded-full flex items-center justify-center transition-all hover:scale-105 active:scale-95 shrink-0 shadow-md">
                <span class="material-symbols-outlined text-sm font-bold">send</span>
            </button>
        </form>
    </div>
</article>
