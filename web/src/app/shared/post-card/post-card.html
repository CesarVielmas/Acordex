<article class="bg-surface-container-high rounded-xl overflow-hidden shadow-lg border border-white/5 hover:border-white/10 transition-colors animate-fade-in group">
    <!-- Header -->
    <div class="p-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <img [src]="authorAvatar" [alt]="authorName" class="w-10 h-10 rounded-full object-cover border border-white/10" />
            <div>
                <h4 class="font-label-bold text-on-surface">{{ authorName }}</h4>
                <p class="text-xs text-on-surface-variant flex items-center gap-1">
                    <span class="material-symbols-outlined text-[14px]">schedule</span>
                    {{ timeAgo }}
                </p>
            </div>
        </div>
        <button class="text-on-surface-variant hover:text-primary transition-colors">
            <span class="material-symbols-outlined">more_vert</span>
        </button>
    </div>

    <!-- Content -->
    <div class="px-4 pb-3">
        <p class="text-body-md text-on-surface-variant">{{ content }}</p>
    </div>

    <!-- Media -->
    <div *ngIf="mediaUrl" class="w-full h-64 md:h-80 bg-surface relative overflow-hidden">
        <img [src]="mediaUrl" alt="Post media" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" />
    </div>

    <!-- Footer Actions -->
    <div class="px-4 py-3 border-t border-white/5 flex items-center gap-6">
        <button class="flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors group/btn">
            <span class="material-symbols-outlined group-hover/btn:scale-110 transition-transform">favorite</span>
            <span class="text-sm font-label-bold">{{ likes }}</span>
        </button>
        <button class="flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors group/btn">
            <span class="material-symbols-outlined group-hover/btn:scale-110 transition-transform">chat_bubble</span>
            <span class="text-sm font-label-bold">{{ comments }}</span>
        </button>
        <button class="flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors ml-auto group/btn">
            <span class="material-symbols-outlined group-hover/btn:scale-110 transition-transform">share</span>
        </button>
    </div>
</article>
