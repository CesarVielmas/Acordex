<div class="flex overflow-x-auto gap-3 pb-2 no-scrollbar">
    <button *ngFor="let filter of filters" 
            (click)="selectFilter(filter)"
            [ngClass]="{
                'bg-primary text-on-primary border-primary': activeFilter === filter,
                'bg-surface-container-high text-on-surface-variant border-outline-variant hover:border-primary-container hover:text-on-surface': activeFilter !== filter
            }"
            class="shrink-0 px-6 py-2 rounded-full font-label-bold text-label-bold border transition-all">
        {{ filter }}
    </button>
</div>
