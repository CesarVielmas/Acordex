<article class="relative h-72 rounded-xl overflow-hidden border border-white/10 group cursor-pointer bg-surface-container shadow-xl hover:shadow-2xl hover:border-primary/30 transition-all duration-300 animate-fade-in">
    <img [alt]="name" [src]="imageUrl"
        class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-700"
        [attr.data-alt]="imageAlt" />
    
    <!-- Gradient Overlay -->
    <div class="absolute inset-0 bg-gradient-to-t from-background via-background/80 to-transparent"></div>
    
    <!-- Content -->
    <div class="absolute bottom-0 left-0 right-0 p-5 flex flex-col justify-end h-full">
        <div class="flex justify-between items-end gap-4">
            <div class="flex-1">
                <div class="flex items-center gap-2 mb-1">
                    <span *ngIf="isFeatured" class="bg-primary/20 text-primary border border-primary/30 px-2.5 py-0.5 rounded text-[10px] font-label-bold tracking-wider uppercase backdrop-blur-sm">
                        Destacado
                    </span>
                    <span *ngIf="tag && !isFeatured" class="px-2 py-0.5 rounded bg-surface-container-high/80 backdrop-blur-sm border border-white/10 text-[10px] font-label-bold text-on-surface-variant uppercase tracking-wider">
                        {{ tag }}
                    </span>
                    <div class="flex items-center text-primary">
                        <span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 1;">star</span>
                        <span class="font-label-bold text-sm ml-1 text-on-surface">{{ rating }}</span>
                    </div>
                </div>
                <h3 class="font-headline-lg text-headline-lg text-on-surface leading-tight">{{ name }}</h3>
                <p class="text-on-surface-variant font-body-md text-sm mt-1 flex items-center gap-1">
                    <span class="material-symbols-outlined text-[14px]">location_on</span>
                    {{ location }} <span *ngIf="availability">• {{ availability }}</span>
                </p>
            </div>
            <button class="shrink-0 bg-primary hover:bg-primary-container text-on-primary font-label-bold text-label-bold px-6 py-3 rounded-full transition-colors shadow-[0_0_15px_rgba(212,175,55,0.3)]">
                Cotizar
            </button>
        </div>
    </div>
</article>
