<article (click)="onQuoteClick($event)" 
         class="flex flex-col h-[390px] rounded-2xl overflow-hidden border border-white/[0.06] group cursor-pointer bg-[#161616]/70 backdrop-blur-xl shadow-2xl hover:shadow-[0_12px_35px_rgba(242,202,80,0.05)] hover:border-primary/20 transition-all duration-500 animate-fade-in font-['Be_Vietnam_Pro'] select-none">
    
    <!-- Top Section: Image, Tag & Rating -->
    <div class="relative h-[50%] overflow-hidden bg-black/40 border-b border-white/[0.04] shrink-0">
        <img [alt]="name" [src]="imageUrl"
             class="w-full h-full object-cover group-hover:scale-[1.04] transition-transform duration-700 ease-out"
             [attr.data-alt]="imageAlt" />
        
        <!-- Premium Tag Badge -->
        <span *ngIf="isFeatured" 
              class="absolute top-3.5 left-3.5 bg-primary text-black font-['Epilogue'] font-black text-[9px] uppercase tracking-wider px-3 py-1 rounded-full shadow-md z-10">
            Destacado
        </span>
        <span *ngIf="tag && !isFeatured" 
              [class]="'absolute top-3.5 left-3.5 border font-medium text-[9px] uppercase tracking-wider px-3 py-1 rounded-full backdrop-blur-md shadow-md z-10 ' + genreBadgeClass">
            {{ tag }}
        </span>

        <!-- Rating Badge -->
        <div class="absolute top-3.5 right-3.5 flex items-center gap-1 bg-black/60 border border-white/10 rounded-full px-2.5 py-1 backdrop-blur-md shadow-md z-10">
            <span class="material-symbols-outlined text-[11px] text-primary fill-current">star</span>
            <span class="text-[10px] font-bold text-white leading-none">{{ rating }}</span>
        </div>
    </div>
    
    <!-- Bottom Section: Info and Call to Action -->
    <div class="flex-1 p-5 flex flex-col justify-between bg-gradient-to-b from-[#181818]/60 to-[#121212]/90">
        <div class="min-w-0">
            <!-- Band Name & Verification -->
            <div class="flex items-center gap-1.5">
                <h3 class="font-['Epilogue'] font-black text-sm md:text-base text-white uppercase tracking-wide leading-tight truncate">
                    {{ name }}
                </h3>
                <span class="material-symbols-outlined text-sm text-primary fill-current select-none shrink-0" title="Artista Verificado">verified</span>
            </div>
            
            <!-- Location and Area Info -->
            <p class="text-white/40 text-[10.5px] mt-2 flex items-center gap-1.5 font-light truncate">
                <span class="material-symbols-outlined text-xs text-primary/70 shrink-0">pin_drop</span>
                <span>{{ location }}</span>
            </p>

            <!-- Manager Info -->
            <p *ngIf="managerName" class="text-white/45 text-[10px] mt-1.5 flex items-center gap-1.5 font-light truncate">
                <span class="material-symbols-outlined text-[12px] text-emerald-400 shrink-0">support_agent</span>
                <span>Rep: {{ managerName }}</span>
            </p>
        </div>

        <!-- Availability Badge & Quoting Button -->
        <div class="flex items-center justify-between mt-3 pt-3 border-t border-white/[0.04]">
            <span class="text-[9.5px] font-medium text-primary bg-primary/5 border border-primary/15 rounded-md px-2.5 py-1 tracking-wide shrink-0">
                {{ availability }}
            </span>
            
            <div class="flex gap-2 shrink-0">
                <a *ngIf="managerPhone" 
                   [href]="'https://api.whatsapp.com/send?phone=' + managerPhone + '&text=Hola%20' + managerName + ',%20me%20gustar%C3%ADa%20cotizar%20la%20agrupaci%C3%B3n%20' + name + '%20para%20un%20evento.'" 
                   target="_blank"
                   (click)="$event.stopPropagation()"
                   title="Contactar al Manager por WhatsApp"
                   class="bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 hover:bg-emerald-500/20 px-3 py-2.5 rounded-xl text-[9px] font-bold uppercase tracking-wider transition-all duration-300 flex items-center gap-1.5 active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512" class="w-3 h-3 fill-current shrink-0">
                        <path d="M380.9 97.1C339 55.1 283.2 32 223.9 32c-122.4 0-222 99.6-222 222 0 39.1 10.2 77.3 29.6 111L0 480l117.7-30.9c32.4 17.7 68.9 27 106.1 27h.1c122.3 0 224.1-99.6 224.1-222 0-59.3-25.2-115-67.1-157zm-157 341.6c-33.2 0-65.7-8.9-94-25.7l-6.7-4-69.8 18.3L72 359.2l-4.4-7c-18.5-29.4-28.2-63.3-28.2-98.2 0-101.7 82.8-184.5 184.6-184.5 49.3 0 95.6 19.2 130.4 54.1 34.8 34.9 56.2 81.2 56.1 130.5 0 101.8-84.9 184.6-186.6 184.6zm101.2-138.2c-5.5-2.8-32.8-16.2-37.9-18-5.1-1.9-8.8-2.8-12.5 2.8-3.7 5.6-14.3 18-17.6 21.8-3.2 3.7-6.5 4.2-12 1.4-32.6-16.3-54-29.1-75.5-66-5.7-9.8 5.7-9.1 16.3-30.3 1.8-3.7 .9-6.9-.5-9.7-1.4-2.8-12.5-30.1-17.1-41.2-4.5-10.8-9.1-9.3-12.5-9.5-3.2-.2-6.9-.2-10.6-.2-3.7 0-9.7 1.4-14.8 6.9-5.1 5.6-19.4 19-19.4 46.3 0 27.3 19.9 53.7 22.6 57.4 2.8 3.7 39.1 59.7 94.8 83.8 35.2 15.2 49 16.5 66.6 13.9 10.7-1.6 32.8-13.4 37.4-26.4 4.6-13 4.6-24.1 3.2-26.4-1.3-2.5-5-3.9-10.5-6.6z"/>
                    </svg>
                    Contactar
                </a>
                
                <button (click)="onQuoteClick($event)"
                        class="bg-primary hover:bg-primary-fixed text-black font-['Epilogue'] font-black text-[9px] uppercase tracking-widest px-4 py-2.5 rounded-xl transition-all duration-300 shadow-[0_3px_10px_rgba(242,202,80,0.1)] group-hover:scale-[1.03] group-hover:shadow-[0_4px_18px_rgba(242,202,80,0.25)] active:scale-95">
                    Cotizar
                </button>
            </div>
        </div>
    </div>
</article>
