<article class="bg-surface-container/60 backdrop-blur-md rounded-xl p-5 shadow-lg border border-white/5 hover:bg-surface-container-high transition-colors animate-fade-in group">
    <div class="flex flex-col md:flex-row gap-4">
        <!-- Avatar & Rating -->
        <div class="flex md:flex-col items-center md:items-start gap-4 md:w-48 shrink-0">
            <img [src]="userAvatar" [alt]="userName" class="w-12 h-12 rounded-full object-cover border border-white/10" />
            <div>
                <h4 class="font-label-bold text-on-surface">{{ userName }}</h4>
                <p class="text-xs text-on-surface-variant flex items-center gap-1 mb-1">
                    <span class="material-symbols-outlined text-[14px]">schedule</span>
                    {{ timeAgo }}
                </p>
                <!-- Stars -->
                <div class="flex items-center gap-0.5 text-primary">
                    <span *ngFor="let isFilled of starsArray" class="material-symbols-outlined text-[16px]" [style.font-variation-settings]="isFilled ? '&quot;FILL&quot; 1' : '&quot;FILL&quot; 0'">
                        star
                    </span>
                </div>
            </div>
        </div>

        <!-- Review Content -->
        <div class="flex-1 flex flex-col justify-center">
            <div class="mb-2">
                <span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-md bg-white/5 text-xs font-label-bold text-on-surface-variant border border-white/10">
                    <span class="material-symbols-outlined text-[14px] text-primary">mic</span>
                    {{ bandName }}
                </span>
                <span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-md bg-white/5 text-xs font-label-bold text-on-surface-variant border border-white/10 ml-2">
                    <span class="material-symbols-outlined text-[14px] text-primary">event</span>
                    {{ eventName }}
                </span>
            </div>
            <p class="text-body-md text-on-surface-variant italic leading-relaxed">
                "{{ content }}"
            </p>
        </div>
    </div>
</article>
