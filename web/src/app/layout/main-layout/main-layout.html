<div class="flex h-screen overflow-hidden bg-background">
  <!-- Desktop Sidebar -->
  <app-sidebar class="hidden md:block flex-shrink-0"></app-sidebar>

  <div class="flex-1 flex flex-col min-w-0 overflow-hidden relative">
    <app-header></app-header>

    <!-- Main Content Canvas -->
    <main class="flex-1 overflow-y-auto pb-24 md:pb-0">
      <router-outlet></router-outlet>
    </main>

    <!-- Mobile Bottom Navigation -->
    <app-bottom-nav class="md:hidden"></app-bottom-nav>
  </div>

  <!-- Global User Profile Modal -->
  <app-user-profile-modal *ngIf="layoutService.activeUserProfileModal()" 
                          [user]="layoutService.activeUserProfileModal()" 
                          (close)="layoutService.closeUserProfile()">
  </app-user-profile-modal>
</div>
