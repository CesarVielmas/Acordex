<aside class="h-full bg-surface-container-lowest border-r border-white/10 flex flex-col transition-all duration-300 ease-in-out"
       [ngClass]="layoutService.isSidebarCollapsed() ? 'w-20' : 'w-64'">
    <!-- Brand -->
    <div class="h-[72px] flex items-center justify-center border-b border-white/10 gap-3 overflow-hidden">
        <h1 class="font-['Epilogue'] font-bold text-2xl font-black text-primary tracking-tighter pt-2 transition-all duration-300"
            [ngClass]="layoutService.isSidebarCollapsed() ? 'opacity-0 w-0 -translate-x-10' : 'opacity-100 w-auto translate-x-0'">
            ACORDEX
        </h1>
        <img src="acordex_without_bg.png" alt="Acordex Logo" 
             class="w-11 h-11 object-contain transition-transform duration-300"
             [ngClass]="layoutService.isSidebarCollapsed() ? 'scale-110' : 'scale-100'">
    </div>

    <!-- Navigation -->
    <nav class="flex-1 px-4 py-6 flex flex-col gap-2 overflow-hidden">
        <a routerLink="/inicio" routerLinkActive="bg-primary/10 text-primary border-r-2 border-primary"
            class="flex items-center gap-3 px-4 py-3 rounded-lg text-on-surface-variant hover:bg-surface-container-high transition-all font-label-bold group overflow-hidden"
            [title]="layoutService.isSidebarCollapsed() ? 'Inicio' : ''">
            <span class="material-symbols-outlined group-hover:scale-110 transition-transform shrink-0">home</span>
            <span class="transition-all duration-300 whitespace-nowrap"
                  [ngClass]="layoutService.isSidebarCollapsed() ? 'opacity-0 translate-x-10' : 'opacity-100 translate-x-0'">
                Inicio
            </span>
        </a>
        <a routerLink="/cotizaciones" routerLinkActive="bg-primary/10 text-primary border-r-2 border-primary"
            class="flex items-center gap-3 px-4 py-3 rounded-lg text-on-surface-variant hover:bg-surface-container-high transition-all font-label-bold overflow-hidden"
            [title]="layoutService.isSidebarCollapsed() ? 'Cotizaciones' : ''">
            <span class="material-symbols-outlined shrink-0">request_quote</span>
            <span class="transition-all duration-300 whitespace-nowrap"
                  [ngClass]="layoutService.isSidebarCollapsed() ? 'opacity-0 translate-x-10' : 'opacity-100 translate-x-0'">
                Cotizaciones
            </span>
        </a>
        <a routerLink="/events" routerLinkActive="bg-primary/10 text-primary border-r-2 border-primary"
            class="flex items-center gap-3 px-4 py-3 rounded-lg text-on-surface-variant hover:bg-surface-container-high transition-all font-label-bold overflow-hidden"
            [title]="layoutService.isSidebarCollapsed() ? 'Eventos' : ''">
            <span class="material-symbols-outlined shrink-0">confirmation_number</span>
            <span class="transition-all duration-300 whitespace-nowrap"
                  [ngClass]="layoutService.isSidebarCollapsed() ? 'opacity-0 translate-x-10' : 'opacity-100 translate-x-0'">
                Eventos
            </span>
        </a>
        <a routerLink="/history" routerLinkActive="bg-primary/10 text-primary border-r-2 border-primary"
            class="flex items-center gap-3 px-4 py-3 rounded-lg text-on-surface-variant hover:bg-surface-container-high transition-all font-label-bold overflow-hidden"
            [title]="layoutService.isSidebarCollapsed() ? 'Historial' : ''">
            <span class="material-symbols-outlined shrink-0">history</span>
            <span class="transition-all duration-300 whitespace-nowrap"
                  [ngClass]="layoutService.isSidebarCollapsed() ? 'opacity-0 translate-x-10' : 'opacity-100 translate-x-0'">
                Historial
            </span>
        </a>
    </nav>

    <!-- Footer Profile -->
    <div class="p-4 border-t border-white/10 mt-auto overflow-hidden">
        <a routerLink="/profile" routerLinkActive="bg-primary/10 text-primary"
            class="flex items-center gap-3 px-4 py-3 rounded-lg text-on-surface-variant hover:bg-surface-container-high transition-all font-label-bold overflow-hidden"
            [title]="layoutService.isSidebarCollapsed() ? 'Perfil' : ''">
            <span class="material-symbols-outlined shrink-0">person</span>
            <span class="transition-all duration-300 whitespace-nowrap"
                  [ngClass]="layoutService.isSidebarCollapsed() ? 'opacity-0 translate-x-10' : 'opacity-100 translate-x-0'">
                Perfil
            </span>
        </a>
    </div>
</aside>
