<div class="max-w-4xl mx-auto px-4 md:px-6 pt-stack-md pb-10 space-y-stack-md">
    <!-- Profile Header Section -->
    <section class="flex flex-col items-center pt-4 pb-6 animate-slide-up" style="animation-delay: 0.1s;">
        <div class="relative w-32 h-32 mb-4 rounded-full p-[2px] bg-gradient-to-tr from-primary-container to-surface-container-highest shadow-[0_0_30px_rgba(212,175,55,0.15)]">
            <img [alt]="user.name"
                class="w-full h-full rounded-full object-cover border-[3px] border-surface-container-lowest"
                [src]="user.profileUrl" />
        </div>
        <h2 class="font-headline-lg text-headline-lg text-on-surface text-center tracking-tight">{{ user.name }}</h2>
        <p class="font-body-md text-body-md text-on-surface-variant mt-1 text-center">{{ user.email }}</p>
    </section>

    <!-- Tipo de Suscripción (Premium Card) -->
    <section class="relative overflow-hidden rounded-xl bg-surface-container/80 backdrop-blur-xl border border-white/10 p-6 shadow-lg animate-slide-up" style="animation-delay: 0.2s;">
        <!-- Decorative Glow -->
        <div class="absolute -top-12 -right-12 w-40 h-40 bg-primary-container/20 rounded-full blur-3xl pointer-events-none"></div>
        <div class="relative z-10 flex flex-col md:flex-row md:justify-between md:items-center gap-4">
            <div>
                <h3 class="font-body-md text-body-md text-on-surface-variant mb-1">Tipo de Suscripción</h3>
                <div class="flex items-center gap-2">
                    <span class="material-symbols-outlined text-primary-container text-3xl" style="font-variation-settings: 'FILL' 1;">workspace_premium</span>
                    <span class="font-headline-md text-headline-md text-primary-container tracking-wide">Premium VIP</span>
                </div>
            </div>
            <button class="bg-primary-container text-on-primary-container font-label-bold text-label-bold px-6 py-3 rounded-lg hover:bg-primary transition-colors shadow-[0_0_15px_rgba(212,175,55,0.3)]">
                Gestionar
            </button>
        </div>
    </section>

    <!-- Información Personal Bento/List -->
    <section class="bg-surface-container/50 backdrop-blur-md border border-white/5 rounded-xl overflow-hidden animate-slide-up" style="animation-delay: 0.3s;">
        <h3 class="font-headline-md text-headline-md text-on-surface px-6 py-5 border-b border-white/10 bg-surface-container-high/40">
            Información Personal
        </h3>
        <div class="flex flex-col">
            <button class="flex items-center justify-between w-full px-6 py-4 hover:bg-white/5 transition-colors border-b border-white/5 group text-left">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center text-on-surface-variant group-hover:text-primary-container transition-colors">
                        <span class="material-symbols-outlined">person</span>
                    </div>
                    <div>
                        <span class="block font-body-md text-body-md text-on-surface font-semibold">Editar Perfil</span>
                        <span class="block font-body-sm text-sm text-on-surface-variant mt-0.5">Nombre, teléfono, ubicación</span>
                    </div>
                </div>
                <span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary-container transition-colors">chevron_right</span>
            </button>
            <button class="flex items-center justify-between w-full px-6 py-4 hover:bg-white/5 transition-colors border-b border-white/5 group text-left">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center text-on-surface-variant group-hover:text-primary-container transition-colors">
                        <span class="material-symbols-outlined">payment</span>
                    </div>
                    <div>
                        <span class="block font-body-md text-body-md text-on-surface font-semibold">Métodos de Pago</span>
                        <span class="block font-body-sm text-sm text-on-surface-variant mt-0.5">Tarjetas vinculadas, facturación</span>
                    </div>
                </div>
                <span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary-container transition-colors">chevron_right</span>
            </button>
            <button class="flex items-center justify-between w-full px-6 py-4 hover:bg-white/5 transition-colors group text-left">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center text-on-surface-variant group-hover:text-primary-container transition-colors">
                        <span class="material-symbols-outlined">security</span>
                    </div>
                    <div>
                        <span class="block font-body-md text-body-md text-on-surface font-semibold">Seguridad</span>
                        <span class="block font-body-sm text-sm text-on-surface-variant mt-0.5">Contraseña, autenticación</span>
                    </div>
                </div>
                <span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary-container transition-colors">chevron_right</span>
            </button>
        </div>
    </section>

    <!-- Logout Action -->
    <section class="pt-4 animate-slide-up" style="animation-delay: 0.4s;">
        <button class="w-full flex items-center justify-center gap-3 py-4 rounded-lg border border-secondary-container/50 text-secondary hover:bg-secondary-container/10 transition-colors font-label-bold text-label-bold uppercase tracking-widest bg-surface-container/30 backdrop-blur-sm">
            <span class="material-symbols-outlined">logout</span>
            Cerrar Sesión
        </button>
    </section>
</div>
